project_id = "ncjpbkfwhmsispiczzgl"

# Conserve la valeur actuelle du projet distant (fonctionnalité payante,
# non activée) — sans cette ligne, `config push` tentait de l'activer par
# défaut et se faisait rejeter (402, plan gratuit) avant même de toucher au SMTP.
[storage.vector]
enabled = false

# SMTP Brevo pour les emails d'auth (confirmation d'inscription, reset mot de
# passe...). Les identifiants ne sont jamais écrits ici en clair : `env(...)`
# lit les variables d'environnement au moment de `supabase config push`,
# depuis le fichier local .env (ignoré par git).
[auth.email.smtp]
enabled = true
host = "smtp-relay.brevo.com"
port = 587
user = "env(BREVO_SMTP_LOGIN)"
pass = "env(BREVO_SMTP_PASSWORD)"
admin_email = "env(BREVO_SENDER_EMAIL)"
sender_name = "AgedGmailYT"

# Templates HTML personnalisés (branding AgedGmailYT) — remplacent le mail
# générique par défaut de Supabase ("Reset Password" nu, sans logo ni
# contexte), qui ressemble trop à un email de phishing pour les filtres
# anti-spam et pour l'utilisateur.
[auth.email.template.recovery]
subject = "Réinitialise ton mot de passe AgedGmailYT"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.confirmation]
subject = "Confirme ton email — AgedGmailYT"
content_path = "./supabase/templates/confirmation.html"
